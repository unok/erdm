name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      RELEASE: "1"
    permissions:
      contents: write
    steps:
      - name: Validate semver tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)(\.(0|[1-9][0-9]*)){2}$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match strict semver vMAJOR.MINOR.PATCH (no leading zeros)."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install build tools
        run: go install github.com/mitchellh/gox@v1.0.1
      - name: Cross compile (gen + frontend + gox)
        run: make release BIN_DIR=dist GOX_TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/386"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
