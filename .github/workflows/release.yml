name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    permissions:
      contents: write
    steps:
      - name: Validate semver tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)(\.(0|[1-9][0-9]*)){2}$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match strict semver vMAJOR.MINOR.PATCH (no leading zeros)."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install build tools
        run: |
          go install github.com/pointlander/peg@latest
          go install github.com/mitchellh/gox@latest
      - name: Generate parser
        run: peg erdm.peg
      - name: Cross compile
        run: |
          gox -osarch "linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/386" \
              -output "dist/{{.Dir}}_{{.OS}}_{{.Arch}}"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
